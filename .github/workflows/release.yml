# Build and publish hop-endpoint from hash-locked tooling and one verified dist artifact.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11.15'
      - name: Install hash-locked build frontend and backend
        run: 'python -m pip install --require-hashes --only-binary=:all: -r requirements-build.txt'
      - name: Verify version and build without dependency fetching
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME#v}" = "$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          python -m build --no-isolation
          mkdir "$RUNNER_TEMP/release"
          cp dist/* "$RUNNER_TEMP/release/"
          python3 .github/release-artifact.py create --directory "$RUNNER_TEMP/release"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release/*
          if-no-files-found: error

  publish:
    needs: build
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Mint canonical-source read token
        id: source-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.HOP_SOURCE_APP_ID }}
          private-key: ${{ secrets.HOP_SOURCE_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: hop
          permission-actions: read
          permission-checks: read
          permission-contents: read
      - name: Verify canonical source provenance
        id: provenance
        env:
          SOURCE_TOKEN: ${{ steps.source-token.outputs.token }}
        run: python3 .github/release-provenance.py --component hop-sdk-python --github-output "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release
      - name: Verify immutable Python distributions
        run: >-
          python3 .github/release-artifact.py verify --directory "$RUNNER_TEMP/release"
          --canonical-source-sha '${{ steps.provenance.outputs.source_sha }}'
      - name: Isolate verified distributions from the release manifest
        run: |
          set -euo pipefail
          mkdir "$RUNNER_TEMP/pypi"
          cp "$RUNNER_TEMP/release/"*.whl "$RUNNER_TEMP/pypi/"
          cp "$RUNNER_TEMP/release/"*.tar.gz "$RUNNER_TEMP/pypi/"
      - name: Publish verified distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ${{ runner.temp }}/pypi
